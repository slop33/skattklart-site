<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skattklart — demo</title>
<style>
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
         background:#1a2744; color:#fff; display:flex; flex-direction:column;
         align-items:center; justify-content:center; min-height:100vh;
         padding:24px; text-align:center; }
  .logo { display:inline-flex; align-items:center; gap:10px; margin-bottom:24px; }
  .logo-mark { width:36px; height:36px; background:#f0b429; color:#1a2744; border-radius:9px;
               display:flex; align-items:center; justify-content:center; font-weight:900; font-size:20px; }
  .logo-word { font-size:26px; font-weight:800; letter-spacing:-.5px; }
  p { color:rgba(255,255,255,.65); margin-bottom:26px; font-size:15px; }
  .btn { display:inline-block; background:#f0b429; color:#1a2744; font-weight:800;
         font-size:17px; padding:16px 36px; border-radius:9px; text-decoration:none; }
  .hint { margin-top:18px; font-size:12px; color:rgba(255,255,255,.4); max-width:340px; line-height:1.6; }
</style>
</head>
<body>
  <div class="logo"><span class="logo-mark"><svg viewBox="0 0 46 46" width="72%" height="72%" style="display:block" aria-label="Skattklart"><path d="M16 12 h14 a2 2 0 0 1 2 2 v18 l-3-2 -3 2 -3-2 -3 2 -3-2 -3 2 V14 a2 2 0 0 1 2-2 z" fill="#1a2744"/><path d="M19.5 24 L22.5 27 L28 20" fill="none" stroke="#f0b429" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/></svg></span><span class="logo-word">Skatt<span style="color:var(--gold,#f0b429)">klart</span></span></div>
  <p>Demot öppnas automatiskt — annars tryck på knappen.</p>
  <a class="btn" id="go" href="https://demo.skattklart.se/demo-login">Öppna demot →</a>
  <div class="hint">Du får ett eget testkonto med färdiga exempel — inget att registrera,
    ingenting sparas kopplat till dig.</div>
  <script>
    setTimeout(function () {
      window.location.href = document.getElementById('go').href;
    }, 1000);
  </script>
</body>
</html>
